name: Export selected to JSON

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install pyyaml

      - name: Aja export
        env:
          TTT_SB_URL: ${{ secrets.TTT_SB_URL }}
          TTT_SB_SERVICE_KEY: ${{ secrets.TTT_SB_SERVICE_KEY }}
        run: python scripts/export_selected.py

      - name: Commit JSON-tiedostot
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data
          if git diff --cached --quiet; then
            echo "Ei muutoksia exportissa."
          else
            git commit -m "data: päivitä public/data valinnan mukaan"
            git push
          fi
